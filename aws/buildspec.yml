version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-2
    ECS_CLUSTER: token-flow-ui
    ECS_SERVICE: token-flow-ui

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/token-flow
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)

  build:
    commands:
      - echo Building token-flow image...
      - docker build -t $IMAGE:$IMAGE_TAG -t $IMAGE:latest .

  post_build:
    commands:
      - echo Pushing image...
      - docker push $IMAGE:$IMAGE_TAG
      - docker push $IMAGE:latest
      - echo Patching task definition with secrets from SSM...
      - >-
        _SK=$(aws ssm get-parameter --name /token-flow/secret_key --with-decryption
        --region $AWS_DEFAULT_REGION --query Parameter.Value --output text 2>/dev/null || true) &&
        _AD=$(aws ssm get-parameter --name /token-flow/auth0_domain
        --region $AWS_DEFAULT_REGION --query Parameter.Value --output text 2>/dev/null || true) &&
        _AC=$(aws ssm get-parameter --name /token-flow/auth0_client_id
        --region $AWS_DEFAULT_REGION --query Parameter.Value --output text 2>/dev/null || true) &&
        aws ecs describe-task-definition --task-definition $ECS_SERVICE
        --region $AWS_DEFAULT_REGION --query taskDefinition --output json > /tmp/td.json &&
        python3 -c "
        import json, sys
        sk, ad, ac = sys.argv[1], sys.argv[2], sys.argv[3]
        with open('/tmp/td.json') as f: td = json.load(f)
        patches = {k: v for k,v in [('SECRET_KEY',sk),('AUTH0_DOMAIN',ad),('AUTH0_CLIENT_ID',ac)] if v}
        for c in td['containerDefinitions']:
          if c['name'] == 'token-flow':
            env = {e['name']: e['value'] for e in c.get('environment',[])}
            env.update(patches)
            c['environment'] = [{'name':k,'value':v} for k,v in env.items()]
        [td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','placementConstraints','compatibilities','registeredAt','registeredBy']]
        json.dump(td, open('/tmp/td_patched.json','w'))
        " -- "$_SK" "$_AD" "$_AC" &&
        NEW_ARN=$(aws ecs register-task-definition --region $AWS_DEFAULT_REGION
        --cli-input-json file:///tmp/td_patched.json
        --query taskDefinition.taskDefinitionArn --output text) &&
        echo "New task def $NEW_ARN" &&
        aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE
        --task-definition $NEW_ARN --region $AWS_DEFAULT_REGION --query service.serviceName --output text &&
        echo "ECS redeployment triggered"
      - printf '[{"name":"token-flow","imageUri":"%s"}]' $IMAGE:$IMAGE_TAG > imagedefinitions.json
      - echo Done.

artifacts:
  files:
    - imagedefinitions.json
