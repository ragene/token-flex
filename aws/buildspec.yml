version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-2
    ECS_CLUSTER: token-flow
    ECS_SERVICE: token-flow

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/token-flow
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - echo Ensuring log group /ecs/token-flow exists...
      - aws logs create-log-group --log-group-name /ecs/token-flow --region $AWS_DEFAULT_REGION 2>/dev/null || true
      - echo Ensuring ECS cluster token-flow exists...
      - |
        CLUSTER_STATUS=$(aws ecs describe-clusters --clusters token-flow --region $AWS_DEFAULT_REGION --query 'clusters[0].status' --output text 2>/dev/null || echo "MISSING")
        if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
          aws ecs create-cluster --cluster-name token-flow --region $AWS_DEFAULT_REGION \
            --capacity-providers FARGATE FARGATE_SPOT
        fi

  build:
    commands:
      - echo Building token-flow image...
      - docker build
          -f token-flow/Dockerfile
          -t $IMAGE:$IMAGE_TAG
          -t $IMAGE:latest
          .

  post_build:
    commands:
      - echo Pushing image...
      - docker push $IMAGE:$IMAGE_TAG
      - docker push $IMAGE:latest
      - echo Registering task definition...
      - |
        cat token-flow/aws/task-definition.json \
          | sed "s|531948420901|$AWS_ACCOUNT_ID|g" \
          > /tmp/task-def-resolved.json
        aws ecs register-task-definition \
          --cli-input-json file:///tmp/task-def-resolved.json \
          --region $AWS_DEFAULT_REGION
      - echo Forcing ECS redeployment...
      - |
        SVC_STATUS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_DEFAULT_REGION --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
        if [ "$SVC_STATUS" = "ACTIVE" ]; then
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment --region $AWS_DEFAULT_REGION
        else
          echo "Service not ACTIVE ($SVC_STATUS) — skipping update-service (run ecs-deploy.sh to create)"
        fi
      - printf '[{"name":"token-flow","imageUri":"%s"}]' $IMAGE:$IMAGE_TAG > imagedefinitions.json
      - echo Done.

artifacts:
  files:
    - imagedefinitions.json
    - token-flow/aws/task-definition.json
